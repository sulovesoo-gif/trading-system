services:
  # 데이터베이스 (TimescaleDB: PostgreSQL 기반 시계열 DB)
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: trading_db
    restart: always
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    networks:
      - trading_net

  # API 서버 (Express/Node.js)
  api-server:
    build: 
      context: .
      dockerfile: services/api-server/Dockerfile
    container_name: trading_api
    restart: always
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB}       # .env의 trading_db 사용
      - DB_USER=${POSTGRES_USER}     # .env의 admin 사용
      - DB_PASSWORD=${POSTGRES_PASSWORD} # .env의 stock123 사용
    ports:
      - "4000:3001"
    depends_on:
      - db
    networks:
      - trading_net

  # 수집 엔진 (Python)
  collector:
    build: 
      context: .
      dockerfile: services/collector/Dockerfile
    container_name: trading_collector
    restart: always
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB}       # .env의 trading_db 사용
      - DB_USER=${POSTGRES_USER}     # .env의 admin 사용
      - DB_PASSWORD=${POSTGRES_PASSWORD} # .env의 stock123 사용
      - PYTHONUNBUFFERED=1  # 추가: 파이썬 로그가 즉시 터미널에 보이게 합니다.
    depends_on:
      - db
    networks:
      - trading_net

  # 대시보드 프론트엔드 (Next.js)
  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: trading_frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./services/frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    env_file: .env
    depends_on:
      - api-server
    networks:
      - trading_net

networks:
  trading_net:
    driver: bridge

volumes:
  timescale_data: